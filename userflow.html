<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>User Flow</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{background:#F5F5F5;font-family:'Apple SD Gothic Neo',Pretendard,sans-serif;}
#canvas{
  position:relative;
  width:1000px;
  height:1500px;
  background:#FAFAFA;
  overflow:hidden;
}
svg#arrows{
  position:absolute;
  top:0;left:0;
  width:100%;height:100%;
  pointer-events:none;
}
/* Section Labels */
.sec-label{
  position:absolute;
  font-size:9px;
  font-weight:700;
  color:#888;
  letter-spacing:.5px;
  text-transform:uppercase;
}
/* Screen Card */
.sc{
  position:absolute;
  width:120px;
  border:1.5px solid #CCCCCC;
  border-radius:6px;
  background:#fff;
  overflow:hidden;
  box-shadow:0 1px 4px rgba(0,0,0,.07);
}
.sc-title{
  font-size:7.5px;
  font-weight:700;
  color:#555;
  padding:3px 5px 0;
}
.sc-hd{
  height:14px;
  background:#222;
  display:flex;
  align-items:center;
  padding:0 5px;
  gap:3px;
}
.sc-hd span{
  display:inline-block;
  width:5px;height:5px;
  border-radius:50%;
  background:#555;
}
.sc-bd{
  padding:5px 5px 6px;
  display:flex;
  flex-direction:column;
  gap:3px;
}
/* Placeholder elements */
.l{height:5px;background:#E0E0E0;border-radius:2px;}
.ls{height:5px;background:#E0E0E0;border-radius:2px;width:60%;}
.lxs{height:5px;background:#E0E0E0;border-radius:2px;width:40%;}
.inp{height:12px;background:#F2F2F2;border:1px solid #DDD;border-radius:3px;}
.btn{height:12px;background:#333;border-radius:3px;}
.btng{height:12px;background:#B0B0B0;border-radius:3px;}
.img{height:32px;background:#EBEBEB;border-radius:3px;}
.img2{height:22px;background:#EBEBEB;border-radius:3px;}
.card{height:40px;background:#F5F5F5;border:1px solid #E8E8E8;border-radius:3px;padding:4px;}
.row2{display:flex;gap:3px;}
.row2 .img2{flex:1;}
.chip{height:10px;background:#E8E8E8;border-radius:10px;width:50%;}
.avatar{width:24px;height:24px;border-radius:50%;background:#CCC;flex-shrink:0;}
.row-h{display:flex;gap:3px;align-items:center;}
.flex1{flex:1;}
.badge{height:10px;background:#444;border-radius:10px;width:30%;}
.msg-r{height:14px;background:#333;border-radius:8px 8px 2px 8px;width:70%;align-self:flex-end;}
.msg-l{height:14px;background:#E8E8E8;border-radius:8px 8px 8px 2px;width:60%;}
.tab{height:16px;background:#F0F0F0;border-top:1px solid #DDD;display:flex;align-items:center;justify-content:space-around;padding:0 6px;}
.tab span{width:12px;height:12px;background:#CCC;border-radius:2px;}
</style>
</head>
<body>
<div id="canvas">

  <!-- S04→S15 mypage branch -->

  <!-- S15→S18 sent requests -->

  <!-- S18→S19 -->
  <line x1="572" y1="1065" x2="608" y2="1065" stroke="#999" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- S05→S20 chat branch -->

  <text x="590" y="1241" font-size="7" fill="#AAA" text-anchor="middle">입장</text>

  <!-- Flow group dividers -->

  <line x1="20" y1="430" x2="980" y2="430" stroke="#E5E5E5" stroke-width="1"/>
  <line x1="20" y1="610" x2="980" y2="610" stroke="#E5E5E5" stroke-width="1"/>
  <line x1="20" y1="790" x2="980" y2="790" stroke="#E5E5E5" stroke-width="1"/>
  <line x1="20" y1="970" x2="980" y2="970" stroke="#E5E5E5" stroke-width="1"/>
  <line x1="20" y1="1150" x2="980" y2="1150" stroke="#E5E5E5" stroke-width="1"/>
</svg>
