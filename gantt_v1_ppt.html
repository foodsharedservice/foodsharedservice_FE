<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8"/>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI','Noto Sans KR',sans-serif;background:#FAF8F3;color:#1F1D18;width:1920px;height:1080px;overflow:hidden;}

header{background:#4A5D3A;color:#FBF9F2;padding:18px 40px;display:flex;align-items:center;justify-content:space-between;height:72px;}
.logo{display:flex;align-items:center;gap:10px;}
.logo-dot{width:10px;height:10px;border-radius:50%;background:#D4A848;}
header h1{font-size:18px;font-weight:800;letter-spacing:-0.02em;}
header p{font-size:11px;color:rgba(251,249,242,0.65);margin-top:1px;}
.header-right{display:flex;gap:16px;}
.stat{text-align:center;}
.stat-n{font-size:20px;font-weight:800;font-family:'Inter',sans-serif;}
.stat-l{font-size:10px;color:rgba(251,249,242,0.6);margin-top:1px;}
.stat-done .stat-n{color:#A8C896;}
.stat-prog .stat-n{color:#D4A848;}
.stat-todo .stat-n{color:rgba(251,249,242,0.45);}
.stat-sep{width:1px;background:rgba(255,255,255,0.15);}

.legend{display:flex;gap:22px;padding:8px 40px;background:#fff;border-bottom:1px solid #E5E0D2;align-items:center;height:34px;}
.legend-item{display:flex;align-items:center;gap:6px;font-size:11px;color:#6B6759;white-space:nowrap;}
.ldot{width:11px;height:11px;border-radius:3px;flex-shrink:0;}

.body{display:flex;height:calc(1080px - 72px - 34px);overflow:hidden;}
.gantt-wrap{flex:1;overflow:hidden;padding:10px 40px 10px 0;}

/* 헤더 행 */
.gh{margin-left:220px;position:relative;height:44px;}
.gh-months{position:absolute;top:0;left:0;right:0;height:22px;}
.gh-weeks{position:absolute;top:22px;left:0;right:0;height:22px;border-bottom:2px solid #E5E0D2;}

/* 태스크 */
.groups{overflow:hidden;}
.gh2{display:flex;align-items:center;gap:8px;padding:5px 0 3px;}
.gh2-t{font-size:9.5px;font-weight:700;letter-spacing:0.1em;text-transform:uppercase;color:#95907F;white-space:nowrap;}
.gh2-l{flex:1;height:1px;background:#E5E0D2;}

.tr{display:flex;align-items:center;margin-bottom:3px;}
.tl{width:220px;flex-shrink:0;padding-right:12px;display:flex;align-items:center;gap:6px;}
.tn{font-size:11px;font-weight:500;color:#3A372F;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;flex:1;}
.pill{display:inline-block;padding:1px 6px;border-radius:999px;font-size:9px;font-weight:700;white-space:nowrap;flex-shrink:0;}
.pill-d{background:#ECEFE3;color:#4A5D3A;}
.pill-i{background:#F6ECD0;color:#B58F33;}
.pill-t{background:#F3EFE5;color:#95907F;}
.pill-e{background:#FBEAE5;color:#B14A3C;}

.tb{flex:1;position:relative;height:22px;}
.bar{height:16px;border-radius:4px;position:absolute;top:3px;display:flex;align-items:center;padding:0 5px;font-size:9px;font-weight:700;white-space:nowrap;overflow:hidden;}
.bar-be{background:#4A5D3A;color:#FBF9F2;}
.bar-fe{background:#7A9A6A;color:#FBF9F2;}
.bar-ip{background:#D4A848;color:#1F1D18;}
.bar-td{background:#E5E0D2;color:#95907F;border:1.5px dashed #C1BCA9;}
.bar-is{background:#B14A3C;color:#fff;}

.ms-row{margin-left:220px;position:relative;height:32px;border-top:1px dashed #E5E0D2;margin-top:4px;}
.ms-flag{position:absolute;transform:translateX(-50%);top:0;display:flex;flex-direction:column;align-items:center;}
.ms-tri{width:0;height:0;border-left:7px solid transparent;border-right:7px solid transparent;border-bottom:12px solid #B14A3C;}
.ms-lbl{font-size:8.5px;font-weight:700;color:#B14A3C;white-space:nowrap;margin-top:2px;text-align:center;}

.today-v{position:absolute;top:0;bottom:0;width:1.5px;background:rgba(212,168,72,0.7);z-index:10;}
</style>
</head>
<body>
<header>
  <div class="logo">
    <div class="logo-dot"></div>
    <div>
      <h1>FoodShare — 프로젝트 간트 차트</h1>
      <p>지역 기반 음식 공유 서비스 · 2026년 5월 – 8월 전체 일정</p>
    </div>
  </div>
  <div class="header-right">
    <div class="stat stat-done"><div class="stat-n">22</div><div class="stat-l">완료</div></div>
    <div class="stat-sep"></div>
    <div class="stat stat-prog"><div class="stat-n">4</div><div class="stat-l">진행중</div></div>
    <div class="stat-sep"></div>
    <div class="stat stat-todo"><div class="stat-n">6</div><div class="stat-l">예정</div></div>
    <div class="stat-sep"></div>
    <div class="stat" style="text-align:center;"><div class="stat-n" style="color:#fff;">2026-06-24</div><div class="stat-l">v2 Deadline</div></div>
  </div>
</header>

<div class="legend">
  <div class="legend-item"><div class="ldot" style="background:#4A5D3A;"></div>BE 완료</div>
  <div class="legend-item"><div class="ldot" style="background:#7A9A6A;"></div>FE 완료</div>
  <div class="legend-item"><div class="ldot" style="background:#D4A848;"></div>진행중</div>
  <div class="legend-item"><div class="ldot" style="background:#E5E0D2;border:1.5px dashed #C1BCA9;"></div>예정</div>
  <div class="legend-item"><div class="ldot" style="background:#B14A3C;"></div>이슈</div>
  <div style="margin-left:auto;font-size:10px;color:#95907F;">◆ 마일스톤 &nbsp;|&nbsp; 세로선 = TODAY (2026-06-25)</div>
</div>

<div class="body">
  <div class="gantt-wrap" id="gantt"></div>
</div>

<script>
const START=new Date('2026-05-01'), END=new Date('2026-08-31'), TODAY=new Date('2026-06-25');
const DAYS=Math.ceil((END-START)/86400000);
const p=d=>Math.min(100,((new Date(d)-START)/86400000/DAYS)*100);
const w=(s,e)=>Math.max(0.5,((new Date(e)-new Date(s))/86400000/DAYS)*100);
const todayP=((TODAY-START)/86400000/DAYS)*100;

const groups=[
  {t:'🏗️ 인프라 & 환경',tasks:[
    {n:'EC2+Docker 배포 환경 구성',s:'done',tp:'be',d:'2026-05-01',e:'2026-05-10'},
    {n:'MySQL + Redis 세팅',s:'done',tp:'be',d:'2026-05-05',e:'2026-05-12'},
    {n:'AWS S3 이미지 스토리지',s:'done',tp:'be',d:'2026-05-10',e:'2026-05-16'},
    {n:'Next.js 프로젝트 초기화',s:'done',tp:'fe',d:'2026-05-08',e:'2026-05-14'},
    {n:'CORS / 세션 쿠키 설정',s:'issue',tp:'be',d:'2026-05-12',e:'2026-05-20'},
  ]},
  {t:'🔐 인증 (Auth)',tasks:[
    {n:'POST /auth/login · logout',s:'done',tp:'be',d:'2026-05-12',e:'2026-05-18'},
    {n:'POST /auth/email/send · verify',s:'done',tp:'be',d:'2026-05-14',e:'2026-05-22'},
    {n:'POST /members (회원가입)',s:'done',tp:'be',d:'2026-05-16',e:'2026-05-24'},
    {n:'FE 로그인 · 회원가입 화면',s:'done',tp:'fe',d:'2026-05-20',e:'2026-06-01'},
  ]},
  {t:'🥗 음식 (Foods)',tasks:[
    {n:'GET /foods 목록 · 상세',s:'done',tp:'be',d:'2026-05-18',e:'2026-05-28'},
    {n:'POST /foods 등록 (멀티파트)',s:'done',tp:'be',d:'2026-05-22',e:'2026-06-02'},
    {n:'POST /foods/expired-date (AI OCR)',s:'done',tp:'be',d:'2026-05-24',e:'2026-06-05'},
    {n:'PATCH /foods/{id} 수정',s:'done',tp:'be',d:'2026-06-01',e:'2026-06-08'},
    {n:'FE 홈 피드 · 무한스크롤',s:'done',tp:'fe',d:'2026-05-28',e:'2026-06-08'},
    {n:'FE 음식 상세 · 등록 · 수정',s:'done',tp:'fe',d:'2026-06-01',e:'2026-06-25'},
  ]},
  {t:'📋 나눔 요청 (Requests)',tasks:[
    {n:'POST · GET · PATCH · DELETE /requests',s:'done',tp:'be',d:'2026-06-03',e:'2026-06-16'},
    {n:'FE 요청 보내기 · 취소 · 목록',s:'done',tp:'fe',d:'2026-06-15',e:'2026-06-25'},
  ]},
  {t:'💬 채팅 (Chat)',tasks:[
    {n:'POST /chat/rooms · GET messages',s:'done',tp:'be',d:'2026-06-10',e:'2026-06-22'},
    {n:'STOMP WebSocket /ws',s:'done',tp:'be',d:'2026-06-16',e:'2026-06-24'},
    {n:'FE 채팅 목록 · 실시간 채팅방',s:'done',tp:'fe',d:'2026-06-18',e:'2026-07-01'},
    {n:'읽음 처리 / 안 읽은 메시지 수',s:'todo',tp:'be',d:'2026-07-05',e:'2026-07-18'},
  ]},
  {t:'🗺️ 지역 기반 v2 — 사전 분석',tasks:[
    {n:'브랜치 현황 확인 & API 명세 검토',s:'done',tp:'be',d:'2026-06-05',e:'2026-06-06'},
    {n:'Food 엔티티 / v1 코드 영향 분석',s:'done',tp:'be',d:'2026-06-06',e:'2026-06-07'},
  ]},
  {t:'🗺️ 지역 기반 v2 — Region 도메인 (TDD)',tasks:[
    {n:'RegionRepositoryTest 작성 (RED)',s:'done',tp:'be',d:'2026-06-07',e:'2026-06-08'},
    {n:'RegionRepository 구현 (GREEN)',s:'done',tp:'be',d:'2026-06-08',e:'2026-06-09'},
    {n:'RegionServiceTest → Service 구현',s:'done',tp:'be',d:'2026-06-09',e:'2026-06-11'},
    {n:'RegionControllerTest → Controller 구현',s:'done',tp:'be',d:'2026-06-11',e:'2026-06-13'},
  ]},
  {t:'🗺️ 지역 기반 v2 — Food v2 도메인 (TDD)',tasks:[
    {n:'Food 엔티티 regionId 필드 추가',s:'done',tp:'be',d:'2026-06-13',e:'2026-06-14'},
    {n:'FoodV2Repository Test → 구현',s:'done',tp:'be',d:'2026-06-14',e:'2026-06-16'},
    {n:'FoodV2Service Test → 구현',s:'done',tp:'be',d:'2026-06-16',e:'2026-06-18'},
    {n:'FoodV2Controller Test → Facade → 구현',s:'done',tp:'be',d:'2026-06-18',e:'2026-06-21'},
  ]},
  {t:'🗺️ 지역 기반 v2 — 검증 & 배포',tasks:[
    {n:'전체 테스트 실행 (257개 통과 확인)',s:'done',tp:'be',d:'2026-06-23',e:'2026-06-24'},
    {n:'commit & push to claude/youthful-rubin',s:'done',tp:'be',d:'2026-06-24',e:'2026-06-24'},
  ]},
  {t:'📐 QA & 배포',tasks:[
    {n:'Vercel 프론트 배포',s:'done',tp:'fe',d:'2026-06-15',e:'2026-06-18'},
    {n:'EC2 백엔드 배포 안정화',s:'inprog',tp:'be',d:'2026-06-20',e:'2026-07-10'},
    {n:'포스트맨 API 테스트',s:'inprog',tp:'be',d:'2026-06-23',e:'2026-07-05'},
    {n:'모바일 반응형 QA',s:'inprog',tp:'fe',d:'2026-07-01',e:'2026-07-14'},
    {n:'성능 최적화 · 캐싱',s:'todo',tp:'be',d:'2026-07-15',e:'2026-08-01'},
    {n:'최종 UAT',s:'todo',tp:'fe',d:'2026-08-10',e:'2026-08-25'},
  ]},
];

const milestones=[
  {d:'2026-06-01',l:'BE API v1'},
  {d:'2026-06-24',l:'🏁 v2 Deadline'},
  {d:'2026-06-25',l:'FE v1'},
  {d:'2026-07-15',l:'통합 QA'},
  {d:'2026-08-25',l:'정식 출시'},
];

const months=[];
let mc=new Date(START);
while(mc<=END){
  const y=mc.getFullYear(),m=mc.getMonth();
  const ms2=new Date(y,m,1),me=new Date(y,m+1,0);
  const s2=Math.max(+START,+ms2),e2=Math.min(+END,+me);
  months.push({l:['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'][m],p:((s2-START)/86400000/DAYS)*100,w:((e2-s2)/86400000/DAYS)*100});
  mc=new Date(y,m+1,1);
}
const weeks=[];
let wc=new Date(START);
while(wc.getDay()!==1)wc.setDate(wc.getDate()+1);
while(wc<=END){
  const we=new Date(wc);we.setDate(wc.getDate()+6);
  const s2=Math.max(+START,+wc),e2=Math.min(+END,+we);
  weeks.push({d:new Date(wc),p:((s2-START)/86400000/DAYS)*100,w:((e2-s2)/86400000/DAYS)*100});
  wc.setDate(wc.getDate()+7);
}

function bc(s,tp){
  if(s==='done'&&tp==='be')return'bar bar-be';
  if(s==='done'&&tp==='fe')return'bar bar-fe';
  if(s==='inprog')return'bar bar-ip';
  if(s==='issue')return'bar bar-is';
  return'bar bar-td';
}
function pill(s){
  if(s==='done')return`<span class="pill pill-d">완료</span>`;
  if(s==='inprog')return`<span class="pill pill-i">진행</span>`;
  if(s==='issue')return`<span class="pill pill-e">이슈</span>`;
  return`<span class="pill pill-t">예정</span>`;
}

const gantt=document.getElementById('gantt');
let h='';

// 월 헤더
h+=`<div class="gh"><div class="gh-months" style="position:relative;">`;
months.forEach(m=>h+=`<div style="position:absolute;left:${m.p}%;width:${m.w}%;text-align:center;font-size:10px;font-weight:700;color:#95907F;border-left:1px solid #E5E0D2;padding:3px 0;">${m.l}</div>`);
h+=`</div><div class="gh-weeks" style="position:relative;">`;
weeks.forEach(w2=>h+=`<div style="position:absolute;left:${w2.p}%;width:${w2.w}%;text-align:center;font-size:8.5px;color:#C1BCA9;border-left:1px solid #F0EBE0;padding:3px 0;">${w2.d.getMonth()+1}/${w2.d.getDate()}</div>`);
h+=`<div class="today-v" style="left:${todayP}%;"></div>`;
h+=`</div></div>`;

// 그룹
groups.forEach(g=>{
  h+=`<div><div class="gh2"><span class="gh2-t">${g.t}</span><div class="gh2-l"></div></div>`;
  g.tasks.forEach(t=>{
    h+=`<div class="tr"><div class="tl"><span class="tn" title="${t.n}">${t.n}</span>${pill(t.s)}</div>`;
    h+=`<div class="tb">`;
    weeks.forEach(w2=>{
      const isTd=w2.d<=TODAY&&new Date(w2.d.getTime()+6*86400000)>=TODAY;
      h+=`<div style="position:absolute;left:${w2.p}%;width:${w2.w}%;height:100%;border-left:1px solid #F0EBE0;${isTd?'background:rgba(212,168,72,0.05);':''}"></div>`;
    });
    h+=`<div style="position:absolute;left:${todayP}%;top:0;bottom:0;width:1px;background:rgba(212,168,72,0.5);z-index:5;"></div>`;
    const bw=w(t.d,t.e);
    h+=`<div class="${bc(t.s,t.tp)}" style="left:${p(t.d)}%;width:${Math.max(bw,0.8)}%;">`;
    if(bw>3)h+=`<span style="overflow:hidden;text-overflow:ellipsis;">${t.tp.toUpperCase()}</span>`;
    h+=`</div></div></div>`;
  });
  h+=`</div>`;
});

// 마일스톤
h+=`<div class="ms-row">`;
weeks.forEach(w2=>h+=`<div style="position:absolute;left:${w2.p}%;width:${w2.w}%;height:100%;border-left:1px solid #F0EBE0;"></div>`);
h+=`<div style="position:absolute;left:${todayP}%;top:0;bottom:0;width:1px;background:rgba(212,168,72,0.5);"></div>`;
milestones.forEach(m=>{
  const mp=p(m.d);
  h+=`<div class="ms-flag" style="left:${mp}%;"><div class="ms-tri"></div><div class="ms-lbl">${m.l}</div></div>`;
});
h+=`</div>`;

gantt.innerHTML=h;
</script>
</body>
</html>
