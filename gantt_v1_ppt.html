<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8"/>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{
  font-family:-apple-system,BlinkMacSystemFont,'Segoe UI','Noto Sans KR',sans-serif;
  background:#FAF8F3;color:#1F1D18;
  width:1920px;height:1080px;overflow:hidden;
}

header{
  background:#4A5D3A;color:#FBF9F2;
  padding:0 44px;display:flex;align-items:center;
  justify-content:space-between;height:64px;
}
.logo{display:flex;align-items:center;gap:10px;}
.logo-dot{width:9px;height:9px;border-radius:50%;background:#D4A848;}
header h1{font-size:17px;font-weight:800;letter-spacing:-0.02em;}
header p{font-size:10.5px;color:rgba(251,249,242,0.6);margin-top:1px;}
.hstats{display:flex;gap:20px;align-items:center;}
.st{text-align:center;}
.sn{font-size:20px;font-weight:800;}
.sl{font-size:9.5px;color:rgba(251,249,242,0.55);margin-top:1px;}
.st-d .sn{color:#A8C896;} .st-i .sn{color:#D4A848;} .st-t .sn{color:rgba(255,255,255,.35);}
.hsep{width:1px;height:28px;background:rgba(255,255,255,.15);}
.dl-chip{background:#D4A848;color:#2D3B23;padding:6px 14px;border-radius:6px;font-size:12px;font-weight:800;}

.leg{
  display:flex;gap:20px;align-items:center;
  padding:5px 44px;background:#fff;border-bottom:1px solid #E5E0D2;height:28px;
}
.li{display:flex;align-items:center;gap:5px;font-size:10.5px;color:#6B6759;white-space:nowrap;}
.ld{width:10px;height:10px;border-radius:3px;flex-shrink:0;}

.body{display:flex;height:calc(1080px - 64px - 28px);overflow:hidden;}
.gwrap{flex:1;overflow:hidden;padding:8px 40px 8px 0;}

/* 헤더 3단 */
.gh{margin-left:216px;}
.gh-mo{position:relative;height:20px;background:#EEEAE0;border-bottom:1.5px solid #B8B2A0;}
.gh-wk{position:relative;height:17px;background:#F5F2EB;border-bottom:1px solid #D8D2C4;}
.gh-dy{position:relative;height:16px;background:#FDFCFA;border-bottom:2px solid #B0A898;}

/* 태스크 */
.grp-hd{display:flex;align-items:center;gap:7px;padding:6px 0 2px;}
.grp-lbl{font-size:9.5px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:#95907F;white-space:nowrap;}
.grp-line{flex:1;height:1px;background:#E5E0D2;}

.tr{display:flex;align-items:center;margin-bottom:3px;}
.tl{width:216px;flex-shrink:0;padding-right:10px;display:flex;align-items:center;gap:5px;}
.tn{font-size:10.5px;font-weight:500;color:#3A372F;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;flex:1;}
.pill{display:inline-block;padding:1px 5px;border-radius:999px;font-size:8.5px;font-weight:700;white-space:nowrap;flex-shrink:0;}
.p-d{background:#ECEFE3;color:#4A5D3A;}
.p-i{background:#F6ECD0;color:#B58F33;}
.p-t{background:#F3EFE5;color:#95907F;}
.p-e{background:#FBEAE5;color:#B14A3C;}

.tb{flex:1;position:relative;height:22px;}
.bar{height:15px;border-radius:4px;position:absolute;top:3.5px;
     display:flex;align-items:center;padding:0 6px;
     font-size:9px;font-weight:700;white-space:nowrap;overflow:hidden;}
.be{background:#4A5D3A;color:#FBF9F2;}
.fe{background:#7A9A6A;color:#FBF9F2;}
.ip{background:#D4A848;color:#1F1D18;}
.td{background:#E5E0D2;color:#95907F;border:1px dashed #C1BCA9;}
.is{background:#B14A3C;color:#fff;}
.sp{background:#7A5A8A;color:#fff;}

.ms-row{margin-left:216px;position:relative;height:30px;border-top:1px dashed #E5E0D2;margin-top:4px;}
.ms-flag{position:absolute;transform:translateX(-50%);top:0;display:flex;flex-direction:column;align-items:center;}
.ms-tri{width:0;height:0;border-left:6px solid transparent;border-right:6px solid transparent;border-bottom:10px solid #4A5D3A;}
.ms-lbl{font-size:8.5px;font-weight:700;white-space:nowrap;margin-top:2px;text-align:center;}
</style>
</head>
<body>
<header>
  <div class="logo">
    <div class="logo-dot"></div>
    <div>
      <h1>FoodShare — 프로젝트 간트 차트</h1>
      <p>지역 기반 음식 공유 서비스 · 2026년 5/21 – 6/24 개발 완료 기간</p>
    </div>
  </div>
  <div class="hstats">
    <div class="st st-d"><div class="sn">23</div><div class="sl">완료 태스크</div></div>
    <div class="hsep"></div>
    <div class="st st-t"><div class="sn">35</div><div class="sl">개발 일수</div></div>
    <div class="hsep"></div>
    <div class="dl-chip">🏁 v2 배포 완료 · 2026-06-24</div>
  </div>
</header>

<div class="leg">
  <div class="li"><div class="ld" style="background:#7A5A8A"></div>명세/기획</div>
  <div class="li"><div class="ld" style="background:#4A5D3A"></div>BE 완료</div>
  <div class="li"><div class="ld" style="background:#7A9A6A"></div>FE 완료</div>
  <div class="li"><div class="ld" style="background:#D4A848"></div>진행중</div>
  <div class="li"><div class="ld" style="background:#B14A3C"></div>이슈</div>
  <div style="margin-left:auto;font-size:10px;color:#95907F;">
    ◆ 마일스톤 &nbsp;|&nbsp;
    <span style="color:#D4A848;font-weight:700;">노란 세로선</span> = 6/24 v2 배포 완료
  </div>
</div>

<div class="body">
  <div class="gwrap" id="gantt"></div>
</div>

<script>
const START = new Date('2026-05-21');
const END   = new Date('2026-06-24');
const DAYS  = Math.round((END - START) / 86400000) + 1; // 35 days

const pct  = d => Math.min(100, Math.max(0, ((new Date(d) - START) / 86400000 / DAYS * 100)));
const wpct = (s, e) => {
  const ms = Math.max(+new Date(s), +START);
  const me = Math.min(+new Date(e), +END);
  return Math.max(0.3, (me - ms) / 86400000 / DAYS * 100);
};
const endP = 100;

const groups = [
  {t:'📋 명세 정의 & 기획', tasks:[
    {n:'서비스 요구사항 정의',        s:'done', tp:'sp', d:'2026-05-21', e:'2026-05-22'},
    {n:'API 명세 작성 (v1)',          s:'done', tp:'sp', d:'2026-05-22', e:'2026-05-24'},
    {n:'DB 스키마 설계',              s:'done', tp:'sp', d:'2026-05-22', e:'2026-05-24'},
    {n:'FE 화면 설계 / 와이어프레임', s:'done', tp:'sp', d:'2026-05-23', e:'2026-05-25'},
  ]},
  {t:'🏗️ 인프라 & 환경', tasks:[
    {n:'EC2 + Docker 배포 환경',      s:'done', tp:'be', d:'2026-05-24', e:'2026-05-29'},
    {n:'MySQL + Redis 세팅',          s:'done', tp:'be', d:'2026-05-26', e:'2026-05-31'},
    {n:'AWS S3 이미지 스토리지',      s:'done', tp:'be', d:'2026-05-28', e:'2026-06-02'},
    {n:'Next.js 프로젝트 초기화',     s:'done', tp:'fe', d:'2026-05-24', e:'2026-05-28'},
    {n:'CORS / 세션 쿠키 설정',       s:'issue',tp:'be', d:'2026-05-29', e:'2026-06-05'},
  ]},
  {t:'🔐 인증 (Auth)', tasks:[
    {n:'POST /auth/login · logout',      s:'done',tp:'be',d:'2026-05-28',e:'2026-06-03'},
    {n:'POST /auth/email/send · verify', s:'done',tp:'be',d:'2026-05-30',e:'2026-06-05'},
    {n:'POST /members (회원가입)',        s:'done',tp:'be',d:'2026-06-01',e:'2026-06-07'},
    {n:'FE 로그인 · 회원가입 화면',      s:'done',tp:'fe',d:'2026-06-03',e:'2026-06-10'},
  ]},
  {t:'🥗 음식 (Foods)', tasks:[
    {n:'GET /foods 목록 · 상세',          s:'done',tp:'be',d:'2026-06-03',e:'2026-06-10'},
    {n:'POST /foods 등록 (멀티파트)',     s:'done',tp:'be',d:'2026-06-05',e:'2026-06-12'},
    {n:'POST /foods/expired-date (AI OCR)',s:'done',tp:'be',d:'2026-06-07',e:'2026-06-12'},
    {n:'PATCH /foods/{id} 수정',          s:'done',tp:'be',d:'2026-06-10',e:'2026-06-15'},
    {n:'FE 홈 피드 · 무한스크롤',        s:'done',tp:'fe',d:'2026-06-08',e:'2026-06-16'},
    {n:'FE 음식 상세 · 등록 · 수정',     s:'done',tp:'fe',d:'2026-06-10',e:'2026-06-24'},
  ]},
  {t:'📋 나눔 요청 (Requests)', tasks:[
    {n:'POST · GET · PATCH · DELETE /requests',s:'done',tp:'be',d:'2026-06-12',e:'2026-06-18'},
    {n:'FE 요청 보내기 · 취소 · 목록',          s:'done',tp:'fe',d:'2026-06-16',e:'2026-06-24'},
  ]},
  {t:'💬 채팅 (Chat)', tasks:[
    {n:'POST /chat/rooms · GET messages', s:'done',tp:'be',d:'2026-06-15',e:'2026-06-22'},
    {n:'STOMP WebSocket /ws',             s:'done',tp:'be',d:'2026-06-18',e:'2026-06-24'},
    {n:'FE 채팅 목록 · 실시간 채팅방',   s:'inprog',tp:'fe',d:'2026-06-20',e:'2026-06-24'},
  ]},
  {t:'🗺️ 지역 기반 v2 — 사전 분석', tasks:[
    {n:'브랜치 현황 확인 & API 명세 검토', s:'done',tp:'be',d:'2026-06-05',e:'2026-06-06'},
    {n:'Food 엔티티 / v1 코드 영향 분석', s:'done',tp:'be',d:'2026-06-06',e:'2026-06-07'},
  ]},
  {t:'🗺️ 지역 기반 v2 — Region TDD', tasks:[
    {n:'RegionRepositoryTest 작성 (RED)',  s:'done',tp:'be',d:'2026-06-07',e:'2026-06-08'},
    {n:'RegionRepository 구현 (GREEN)',    s:'done',tp:'be',d:'2026-06-08',e:'2026-06-09'},
    {n:'RegionServiceTest → Service 구현',s:'done',tp:'be',d:'2026-06-09',e:'2026-06-11'},
    {n:'RegionControllerTest → Controller',s:'done',tp:'be',d:'2026-06-11',e:'2026-06-13'},
  ]},
  {t:'🗺️ 지역 기반 v2 — Food v2 TDD', tasks:[
    {n:'Food 엔티티 regionId 필드 추가',   s:'done',tp:'be',d:'2026-06-13',e:'2026-06-14'},
    {n:'FoodV2Repository Test → 구현',     s:'done',tp:'be',d:'2026-06-14',e:'2026-06-16'},
    {n:'FoodV2Service Test → 구현',        s:'done',tp:'be',d:'2026-06-16',e:'2026-06-18'},
    {n:'FoodV2Controller → Facade → 구현',s:'done',tp:'be',d:'2026-06-18',e:'2026-06-21'},
  ]},
  {t:'🗺️ 지역 기반 v2 — 검증 & 배포', tasks:[
    {n:'전체 테스트 실행 (257개 통과)',  s:'done',tp:'be',d:'2026-06-23',e:'2026-06-24'},
    {n:'commit & push → main 🏁',       s:'done',tp:'be',d:'2026-06-24',e:'2026-06-24'},
  ]},
  {t:'📐 배포', tasks:[
    {n:'Vercel 프론트 배포',            s:'done',  tp:'fe',d:'2026-06-18',e:'2026-06-21'},
    {n:'EC2 백엔드 배포',               s:'inprog',tp:'be',d:'2026-06-20',e:'2026-06-24'},
    {n:'포스트맨 API 테스트',           s:'inprog',tp:'be',d:'2026-06-23',e:'2026-06-24'},
  ]},
];

const milestones = [
  {d:'2026-05-25', l:'기획 완료',    c:'#7A5A8A'},
  {d:'2026-06-01', l:'인프라 완료',  c:'#5B7A4A'},
  {d:'2026-06-10', l:'Auth 완료',    c:'#5A8A7A'},
  {d:'2026-06-15', l:'BE API v1',    c:'#4A7A5A'},
  {d:'2026-06-24', l:'🏁 v2 배포 완료', c:'#D4A848'},
];

/* ── 월/주/일 ── */
const months = [];
let mc = new Date(START.getFullYear(), START.getMonth(), 1);
while (mc <= END) {
  const y=mc.getFullYear(), m=mc.getMonth();
  const ms2=new Date(y,m,1), me=new Date(y,m+1,0);
  const s2=Math.max(+START,+ms2), e2=Math.min(+END,+me);
  if(s2<=e2) months.push({
    l:['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug'][m],
    p:((s2-START)/86400000/DAYS)*100,
    w:((e2-s2+1)/DAYS)*100
  });
  mc=new Date(y,m+1,1);
}

const weeks=[];
let wc=new Date(START);
while(wc.getDay()!==1) wc.setDate(wc.getDate()+1);
while(wc<=END){
  const we=new Date(wc); we.setDate(wc.getDate()+6);
  const s2=Math.max(+START,+wc), e2=Math.min(+END,+we);
  weeks.push({d:new Date(wc), p:((s2-START)/86400000/DAYS)*100, w:((e2-s2+1)/DAYS)*100});
  wc.setDate(wc.getDate()+7);
}

const allDays=[];
for(let i=0;i<DAYS;i++){
  const d=new Date(START); d.setDate(START.getDate()+i);
  allDays.push({
    dayNum:d.getDate(), p:(i/DAYS)*100, w:(1/DAYS)*100,
    isMon:d.getDay()===1, isSat:d.getDay()===6, isSun:d.getDay()===0,
    isEnd:i===DAYS-1,
    dateStr:d.toISOString().slice(0,10),
    isFirst:d.getDate()===1,
  });
}

function cls(s,tp){
  if(s==='done'){ return tp==='be'?'bar be':tp==='fe'?'bar fe':tp==='sp'?'bar sp':'bar be'; }
  if(s==='inprog') return 'bar ip';
  if(s==='issue')  return 'bar is';
  return 'bar td';
}
function pill(s){
  if(s==='done')   return`<span class="pill p-d">완료</span>`;
  if(s==='inprog') return`<span class="pill p-i">진행</span>`;
  if(s==='issue')  return`<span class="pill p-e">이슈</span>`;
  return`<span class="pill p-t">예정</span>`;
}

function grid(){
  let s='';
  allDays.forEach(day=>{
    const wkend = day.isSat||day.isSun;
    const bg = day.isEnd?'rgba(212,168,72,.08)':wkend?'rgba(0,0,0,.025)':day.isMon?'rgba(0,0,0,.012)':'';
    const bl = day.isFirst?'2px solid #A09888':day.isMon?'1px solid #D0CAB8':'1px solid #ECEAE2';
    s+=`<div style="position:absolute;left:${day.p}%;width:${day.w}%;height:100%;border-left:${bl};background:${bg};"></div>`;
  });
  // 마감선 (6/24 = 마지막 날 오른쪽 끝)
  s+=`<div style="position:absolute;right:0;top:0;bottom:0;width:2.5px;background:rgba(212,168,72,.8);z-index:9;"></div>`;
  return s;
}

const gantt=document.getElementById('gantt');
let h='';

// 월
h+=`<div class="gh"><div class="gh-mo">`;
months.forEach(m=>h+=`<div style="position:absolute;left:${m.p}%;width:${m.w}%;text-align:center;font-size:11px;font-weight:800;color:#5A5443;border-left:2px solid #B0A890;line-height:20px;overflow:hidden;letter-spacing:.02em;">${m.l} 2026</div>`);
h+=`<div style="position:absolute;right:0;top:0;bottom:0;width:2.5px;background:rgba(212,168,72,.8);"></div>`;
h+=`</div>`;

// 주
h+=`<div class="gh-wk">`;
weeks.forEach(w2=>h+=`<div style="position:absolute;left:${w2.p}%;width:${w2.w}%;text-align:center;font-size:9px;font-weight:600;color:#7A7464;border-left:1px solid #D8D2C4;line-height:17px;overflow:hidden;">${w2.d.getMonth()+1}/${w2.d.getDate()} (W)</div>`);
h+=`<div style="position:absolute;right:0;top:0;bottom:0;width:2.5px;background:rgba(212,168,72,.8);"></div>`;
h+=`</div>`;

// 일 (35일이므로 모든 날 숫자 표시)
h+=`<div class="gh-dy">`;
allDays.forEach(day=>{
  const wkend=day.isSat||day.isSun;
  const bg=day.isEnd?'rgba(212,168,72,.12)':wkend?'rgba(0,0,0,.03)':'';
  const bl=day.isFirst?'2px solid #9A9280':day.isMon?'1.5px solid #C0B8A8':'1px solid #E2DDD0';
  const nc=day.isEnd?'#B8900B':wkend?'#C0ACA0':day.isMon?'#5A5443':'#8A8478';
  const nw=day.isMon||day.isFirst||day.isEnd?'700':'400';
  h+=`<div style="position:absolute;left:${day.p}%;width:${day.w}%;height:100%;border-left:${bl};background:${bg};display:flex;align-items:center;justify-content:center;">`;
  h+=`<span style="font-size:8.5px;color:${nc};font-weight:${nw};">${day.dayNum}</span>`;
  h+=`</div>`;
});
h+=`<div style="position:absolute;right:0;top:0;bottom:0;width:2.5px;background:rgba(212,168,72,.8);z-index:5;"></div>`;
h+=`</div></div>`;// gh-dy, gh

// 그룹 & 태스크
groups.forEach(g=>{
  h+=`<div><div class="grp-hd"><span class="grp-lbl">${g.t}</span><div class="grp-line"></div></div>`;
  g.tasks.forEach(t=>{
    h+=`<div class="tr"><div class="tl"><span class="tn" title="${t.n}">${t.n}</span>${pill(t.s)}</div>`;
    h+=`<div class="tb">${grid()}`;
    const left=pct(t.d), bw=wpct(t.d,t.e);
    h+=`<div class="${cls(t.s,t.tp)}" style="left:${left}%;width:${bw}%;">`;
    if(bw>3) h+=`<span>${t.tp==='sp'?'기획':t.tp==='be'?'BE':t.tp==='fe'?'FE':''}</span>`;
    h+=`</div></div></div>`;
  });
  h+=`</div>`;
});

// 마일스톤
h+=`<div class="ms-row">${grid()}`;
milestones.forEach(m=>{
  const mp=pct(m.d);
  h+=`<div class="ms-flag" style="left:${mp}%;">`;
  h+=`<div class="ms-tri" style="border-bottom-color:${m.c};"></div>`;
  h+=`<div class="ms-lbl" style="color:${m.c};">${m.l}</div>`;
  h+=`</div>`;
});
h+=`</div>`;

gantt.innerHTML=h;
</script>
</body>
</html>
