<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8"/>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{
  font-family:-apple-system,BlinkMacSystemFont,'Segoe UI','Noto Sans KR',sans-serif;
  background:#FAF8F3;color:#1F1D18;
  width:1920px;height:1080px;overflow:hidden;
}

header{
  background:#2A2A2A;color:#F5F5F5;
  padding:0 44px;display:flex;align-items:center;
  justify-content:space-between;height:64px;
}
.logo{display:flex;align-items:center;gap:10px;}
.logo-dot{width:9px;height:9px;border-radius:50%;background:#AAAAAA;}
header h1{font-size:17px;font-weight:800;letter-spacing:-0.02em;}
header p{font-size:10.5px;color:rgba(245,245,245,0.55);margin-top:1px;}
.hstats{display:flex;gap:20px;align-items:center;}
.st{text-align:center;}
.sn{font-size:20px;font-weight:800;color:#F0F0F0;}
.sl{font-size:9.5px;color:rgba(245,245,245,0.5);margin-top:1px;}
.hsep{width:1px;height:28px;background:rgba(255,255,255,.15);}
.dl-chip{background:#E0E0E0;color:#1A1A1A;padding:6px 14px;border-radius:6px;font-size:12px;font-weight:800;}

.leg{
  display:flex;gap:20px;align-items:center;
  padding:5px 44px;background:#fff;border-bottom:1px solid #DDDDD8;height:28px;
}
.li{display:flex;align-items:center;gap:5px;font-size:10.5px;color:#6B6B6B;white-space:nowrap;}
.ld{width:10px;height:10px;border-radius:3px;flex-shrink:0;}

.body{display:flex;height:calc(1080px - 64px - 28px);overflow:hidden;}
.gwrap{flex:1;overflow:hidden;padding:8px 40px 8px 0;}

/* 헤더 3단 */
.gh{margin-left:220px;}
.gh-mo{position:relative;height:20px;background:#EBEBEB;border-bottom:1.5px solid #AAAAAA;}
.gh-wk{position:relative;height:17px;background:#F5F5F5;border-bottom:1px solid #D0D0D0;}
.gh-dy{position:relative;height:16px;background:#FDFDFD;border-bottom:2px solid #AAAAAA;}

/* 태스크 */
.grp-hd{display:flex;align-items:center;gap:7px;padding:6px 0 2px;}
.grp-lbl{font-size:9.5px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:#888;white-space:nowrap;}
.grp-line{flex:1;height:1px;background:#DDDDD8;}

.tr{display:flex;align-items:center;margin-bottom:3px;}
.tl{width:220px;flex-shrink:0;padding-right:10px;display:flex;align-items:center;gap:5px;}
.tn{font-size:10.5px;font-weight:500;color:#2A2A2A;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;flex:1;}
.pill{display:inline-block;padding:1px 5px;border-radius:999px;font-size:8.5px;font-weight:700;white-space:nowrap;flex-shrink:0;}
.p-d{background:#E8E8E8;color:#444;}
.p-i{background:#F0F0F0;color:#555;}
.p-e{background:#E0E0E0;color:#333;border:1px solid #AAA;}

.tb{flex:1;position:relative;height:22px;}
.bar{height:15px;border-radius:4px;position:absolute;top:3.5px;
     display:flex;align-items:center;padding:0 6px;
     font-size:9px;font-weight:700;white-space:nowrap;overflow:hidden;}
.be{background:#444444;color:#FFF;}
.fe{background:#888888;color:#FFF;}
.ip{background:#BBBBBB;color:#1A1A1A;}
.td{background:#E8E8E8;color:#777;border:1px dashed #AAAAAA;}
.is{background:#333333;color:#fff;border:1px solid #000;}
.sp{background:#666666;color:#fff;}

.ms-row{margin-left:220px;position:relative;height:30px;border-top:1px dashed #DDDDD8;margin-top:4px;}
.ms-flag{position:absolute;transform:translateX(-50%);top:0;display:flex;flex-direction:column;align-items:center;}
.ms-tri{width:0;height:0;border-left:6px solid transparent;border-right:6px solid transparent;border-bottom:10px solid #444;}
.ms-lbl{font-size:8.5px;font-weight:700;color:#444;white-space:nowrap;margin-top:2px;text-align:center;}
</style>
</head>
<body>
<header>
  <div class="logo">
    <div class="logo-dot"></div>
    <div>
      <h1>FoodShare — 프로젝트 간트 차트</h1>
      <p>지역 기반 음식 공유 서비스 · 2026년 5/21 – 6/24 개발 완료 기간</p>
    </div>
  </div>
  <div class="hstats">
    <div class="st"><div class="sn">19</div><div class="sl">완료 태스크</div></div>
    <div class="hsep"></div>
    <div class="st"><div class="sn">35</div><div class="sl">개발 일수</div></div>
    <div class="hsep"></div>
    <div class="dl-chip">배포 완료 · 2026-06-24</div>
  </div>
</header>

<div class="leg">
  <div class="li"><div class="ld" style="background:#666"></div>명세/기획</div>
  <div class="li"><div class="ld" style="background:#444"></div>BE 완료</div>
  <div class="li"><div class="ld" style="background:#888"></div>FE 완료</div>
  <div class="li"><div class="ld" style="background:#BBB"></div>진행중</div>
  <div class="li"><div class="ld" style="background:#333;border:1px solid #000"></div>이슈</div>
  <div style="margin-left:auto;font-size:10px;color:#888;">
    ◆ 마일스톤 &nbsp;|&nbsp; 세로선 = 6/24 배포 완료
  </div>
</div>

<div class="body">
  <div class="gwrap" id="gantt"></div>
</div>

<script>
const START = new Date('2026-05-21');
const END   = new Date('2026-06-24');
const DAYS  = Math.round((END - START) / 86400000) + 1; // 35

const pct  = d => Math.min(100, Math.max(0, ((new Date(d) - START) / 86400000 / DAYS * 100)));
const wpct = (s, e) => {
  const ms = Math.max(+new Date(s), +START);
  const me = Math.min(+new Date(e), +END);
  return Math.max(0.3, (me - ms) / 86400000 / DAYS * 100);
};

const groups = [
  {t:'📋 명세 정의 & 기획', tasks:[
    {n:'서비스 요구사항 정의',         s:'done', tp:'sp', d:'2026-05-21', e:'2026-05-22'},
    {n:'API 명세 작성 (v1)',           s:'done', tp:'sp', d:'2026-05-22', e:'2026-05-24'},
    {n:'DB 스키마 설계',               s:'done', tp:'sp', d:'2026-05-22', e:'2026-05-24'},
    {n:'FE 화면 설계 / 와이어프레임',  s:'done', tp:'sp', d:'2026-05-23', e:'2026-05-25'},
  ]},
  {t:'🏗️ 인프라 & 환경', tasks:[
    {n:'EC2 + Docker 배포 환경',       s:'done', tp:'be', d:'2026-05-24', e:'2026-05-29'},
    {n:'MySQL + Redis 세팅',           s:'done', tp:'be', d:'2026-05-26', e:'2026-05-31'},
    {n:'AWS S3 이미지 스토리지',       s:'done', tp:'be', d:'2026-05-28', e:'2026-06-02'},
    {n:'Next.js 프로젝트 초기화',      s:'done', tp:'fe', d:'2026-05-24', e:'2026-05-28'},
    {n:'CORS / 세션 쿠키 설정',        s:'issue',tp:'be', d:'2026-05-29', e:'2026-06-05'},
  ]},
  {t:'🔐 인증 (Auth)', tasks:[
    {n:'POST /auth/login · logout',       s:'done',tp:'be',d:'2026-05-28',e:'2026-06-03'},
    {n:'POST /auth/email/send · verify',  s:'done',tp:'be',d:'2026-05-30',e:'2026-06-05'},
    {n:'POST /members (회원가입)',         s:'done',tp:'be',d:'2026-06-01',e:'2026-06-07'},
    {n:'FE 로그인 · 회원가입 화면',       s:'done',tp:'fe',d:'2026-06-03',e:'2026-06-10'},
  ]},
  {t:'🥗 음식 (Foods)', tasks:[
    {n:'GET /foods 목록 · 상세',           s:'done',tp:'be',d:'2026-06-03',e:'2026-06-10'},
    {n:'POST /foods 등록 (멀티파트)',      s:'done',tp:'be',d:'2026-06-05',e:'2026-06-12'},
    {n:'POST /foods/expired-date (AI OCR)',s:'done',tp:'be',d:'2026-06-07',e:'2026-06-12'},
    {n:'PATCH /foods/{id} 수정',           s:'done',tp:'be',d:'2026-06-10',e:'2026-06-15'},
    {n:'FE 홈 피드 · 무한스크롤',         s:'done',tp:'fe',d:'2026-06-08',e:'2026-06-16'},
    {n:'FE 음식 상세 · 등록 · 수정',      s:'done',tp:'fe',d:'2026-06-10',e:'2026-06-24'},
  ]},
  {t:'📋 나눔 요청 (Requests)', tasks:[
    {n:'POST · GET · PATCH · DELETE /requests',s:'done',tp:'be',d:'2026-06-12',e:'2026-06-18'},
    {n:'FE 요청 보내기 · 취소 · 목록',          s:'done',tp:'fe',d:'2026-06-16',e:'2026-06-24'},
  ]},
  {t:'💬 채팅 (Chat)', tasks:[
    {n:'POST /chat/rooms · GET messages',  s:'done', tp:'be',d:'2026-06-15',e:'2026-06-22'},
    {n:'STOMP WebSocket /ws',              s:'done', tp:'be',d:'2026-06-18',e:'2026-06-24'},
    {n:'FE 채팅 목록 · 실시간 채팅방',    s:'inprog',tp:'fe',d:'2026-06-20',e:'2026-06-24'},
  ]},
  {t:'🚀 배포', tasks:[
    {n:'Vercel 프론트엔드 배포',           s:'done', tp:'fe',d:'2026-06-18',e:'2026-06-21'},
    {n:'EC2 Spring Boot 백엔드 배포',      s:'done', tp:'be',d:'2026-06-20',e:'2026-06-24'},
    {n:'도메인 연결 · HTTPS 설정',         s:'done', tp:'be',d:'2026-06-21',e:'2026-06-23'},
    {n:'포스트맨 API 통합 테스트',         s:'done', tp:'be',d:'2026-06-23',e:'2026-06-24'},
    {n:'최종 배포 확인 · v2 완료',         s:'done', tp:'be',d:'2026-06-24',e:'2026-06-24'},
  ]},
];

const milestones = [
  {d:'2026-05-25', l:'기획 완료'},
  {d:'2026-06-01', l:'인프라 완료'},
  {d:'2026-06-10', l:'Auth 완료'},
  {d:'2026-06-15', l:'BE API v1'},
  {d:'2026-06-24', l:'배포 완료'},
];

/* 월/주/일 */
const months=[];
let mc=new Date(START.getFullYear(),START.getMonth(),1);
while(mc<=END){
  const y=mc.getFullYear(),m=mc.getMonth();
  const ms2=new Date(y,m,1),me=new Date(y,m+1,0);
  const s2=Math.max(+START,+ms2),e2=Math.min(+END,+me);
  if(s2<=e2) months.push({l:['Jan','Feb','Mar','Apr','May','Jun'][m],p:((s2-START)/86400000/DAYS)*100,w:((e2-s2+1)/DAYS)*100});
  mc=new Date(y,m+1,1);
}
const weeks=[];
let wc=new Date(START);
while(wc.getDay()!==1) wc.setDate(wc.getDate()+1);
while(wc<=END){
  const we=new Date(wc);we.setDate(wc.getDate()+6);
  const s2=Math.max(+START,+wc),e2=Math.min(+END,+we);
  weeks.push({d:new Date(wc),p:((s2-START)/86400000/DAYS)*100,w:((e2-s2+1)/DAYS)*100});
  wc.setDate(wc.getDate()+7);
}
const allDays=[];
for(let i=0;i<DAYS;i++){
  const d=new Date(START);d.setDate(START.getDate()+i);
  allDays.push({
    dayNum:d.getDate(),p:(i/DAYS)*100,w:(1/DAYS)*100,
    isMon:d.getDay()===1,isWE:d.getDay()===0||d.getDay()===6,
    isLast:i===DAYS-1,isFirst:d.getDate()===1,
  });
}

function cls(s,tp){
  if(s==='done'){return tp==='be'?'bar be':tp==='fe'?'bar fe':tp==='sp'?'bar sp':'bar be';}
  if(s==='inprog') return'bar ip';
  if(s==='issue')  return'bar is';
  return'bar td';
}
function pill(s){
  if(s==='done')   return`<span class="pill p-d">완료</span>`;
  if(s==='inprog') return`<span class="pill p-i">진행</span>`;
  if(s==='issue')  return`<span class="pill p-e">이슈</span>`;
  return`<span class="pill p-d">예정</span>`;
}

function grid(){
  let s='';
  allDays.forEach(day=>{
    const bg=day.isLast?'rgba(0,0,0,.05)':day.isWE?'rgba(0,0,0,.02)':day.isMon?'rgba(0,0,0,.01)':'';
    const bl=day.isFirst?'2px solid #999':day.isMon?'1px solid #D0D0D0':'1px solid #EBEBEB';
    s+=`<div style="position:absolute;left:${day.p}%;width:${day.w}%;height:100%;border-left:${bl};background:${bg};"></div>`;
  });
  s+=`<div style="position:absolute;right:0;top:0;bottom:0;width:2px;background:rgba(0,0,0,.5);z-index:9;"></div>`;
  return s;
}

const gantt=document.getElementById('gantt');
let h='';

// 월
h+=`<div class="gh"><div class="gh-mo">`;
months.forEach(m=>h+=`<div style="position:absolute;left:${m.p}%;width:${m.w}%;text-align:center;font-size:11px;font-weight:800;color:#333;border-left:2px solid #AAA;line-height:20px;overflow:hidden;">${m.l} 2026</div>`);
h+=`<div style="position:absolute;right:0;top:0;bottom:0;width:2px;background:rgba(0,0,0,.5);"></div></div>`;

// 주
h+=`<div class="gh-wk">`;
weeks.forEach(w2=>h+=`<div style="position:absolute;left:${w2.p}%;width:${w2.w}%;text-align:center;font-size:9px;font-weight:600;color:#777;border-left:1px solid #D0D0D0;line-height:17px;overflow:hidden;">${w2.d.getMonth()+1}/${w2.d.getDate()} W</div>`);
h+=`<div style="position:absolute;right:0;top:0;bottom:0;width:2px;background:rgba(0,0,0,.5);"></div></div>`;

// 일
h+=`<div class="gh-dy">`;
allDays.forEach(day=>{
  const bg=day.isLast?'rgba(0,0,0,.06)':day.isWE?'rgba(0,0,0,.025)':'';
  const bl=day.isFirst?'2px solid #999':day.isMon?'1.5px solid #C0C0C0':'1px solid #E0E0E0';
  const nc=day.isLast?'#111':day.isMon?'#333':'#999';
  const nw=day.isMon||day.isFirst||day.isLast?'700':'400';
  h+=`<div style="position:absolute;left:${day.p}%;width:${day.w}%;height:100%;border-left:${bl};background:${bg};display:flex;align-items:center;justify-content:center;">`;
  h+=`<span style="font-size:8.5px;color:${nc};font-weight:${nw};">${day.dayNum}</span>`;
  h+=`</div>`;
});
h+=`<div style="position:absolute;right:0;top:0;bottom:0;width:2px;background:rgba(0,0,0,.5);z-index:5;"></div>`;
h+=`</div></div>`;

// 그룹 & 태스크
groups.forEach(g=>{
  h+=`<div><div class="grp-hd"><span class="grp-lbl">${g.t}</span><div class="grp-line"></div></div>`;
  g.tasks.forEach(t=>{
    h+=`<div class="tr"><div class="tl"><span class="tn" title="${t.n}">${t.n}</span>${pill(t.s)}</div>`;
    h+=`<div class="tb">${grid()}`;
    const left=pct(t.d),bw=wpct(t.d,t.e);
    h+=`<div class="${cls(t.s,t.tp)}" style="left:${left}%;width:${bw}%;">`;
    if(bw>2.5) h+=`<span>${t.tp==='sp'?'기획':t.tp==='be'?'BE':t.tp==='fe'?'FE':''}</span>`;
    h+=`</div></div></div>`;
  });
  h+=`</div>`;
});

// 마일스톤
h+=`<div class="ms-row">${grid()}`;
milestones.forEach(m=>{
  const mp=pct(m.d);
  h+=`<div class="ms-flag" style="left:${mp}%;"><div class="ms-tri"></div><div class="ms-lbl">${m.l}</div></div>`;
});
h+=`</div>`;

gantt.innerHTML=h;
</script>
</body>
</html>
